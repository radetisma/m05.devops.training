version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Build and Push to DockerHUB
    dependencies: []
    task:
      jobs:
        - name: "\U0001F7E2 Run Tests"
          commands:
            - checkout
            - cd 1-deployment
            - docker build -t my-flask-image .
            - 'docker tag my-flask-image $DOCKER_USERNAME/my-flask-image:latest'
            - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
            - 'docker push $DOCKER_USERNAME/my-flask-image:latest'
      secrets:
        - name: Docker Rade
  - name: Deploy to Kubernets
    dependencies:
      - Build and Push to DockerHUB
    task:
      jobs:
        - name: "\U0001F4E6 Deploy to Production"
          commands:
            - '#Configure kubectl using the provided kubeconfig secret.'
            - kubectl create namespace g2 || true.
            - kubectl config set-context --current --namespace=g2
            - '#Deploy the manifests into that namespace:'
            - kubectl apply -f deployment.yml
            - kubectl apply -f service.yml
            - '#Wait for the rollout to complete (kubectl rollout status deployment/flask-app)'
      secrets:
        - name: kubeconfig
