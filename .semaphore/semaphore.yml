version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - checkout
blocks:
  - name: Build and Push to DockerHUB
    dependencies: []
    task:
      jobs:
        - name: Build images
          commands:
            - cd 1-deployment
            - docker build -t my-flask-image .
            - 'docker tag my-flask-image $DOCKER_USERNAME/my-flask-image:latest'
            - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
            - 'docker push $DOCKER_USERNAME/my-flask-image:latest'
      secrets:
        - name: Docker Rade
  - name: Deploy Stable
    dependencies:
      - Build and Push to DockerHUB
    task:
      jobs:
        - name: Deploy
          commands:
            - cd 3-canary-deployment
            - '#Configure kubectl using the provided kubeconfig secret.'
            - kubectl config set-context --current --namespace=g2
            - kubectl apply -f deployment-stable.yml
            - kubectl apply -f service.yml
            - '#Wait for the rollout to complete'
            - kubectl rollout status deployment/flask-app-stable
            - kubectl get svc flask-app
      secrets:
        - name: kubeconfig
  - name: Deploy Canary
    dependencies:
      - Build and Push to DockerHUB
    task:
      jobs:
        - name: Deploy
          commands:
            - cd 3-canary-deployment
            - '#Configure kubectl using the provided kubeconfig secret.'
            - kubectl config set-context --current --namespace=g2
            - kubectl apply -f deployment-canary.yml
            - kubectl rollout status deployment/flask-app-canary
            - kubectl get svc flask-app
      secrets:
        - name: kubeconfig
